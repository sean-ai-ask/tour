<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>션투어 - 글로벌 여행 가이드</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Noto Sans KR', sans-serif; background: #0c1a2e; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* 헤더 및 검색창 */
        .header { background: #0c1a2e; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 10; }
        h1 { font-size: 20px; font-weight: 900; margin-bottom: 12px; color: #fbbf24; text-align: center; }
        .search-container { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .input-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .input-item { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .input-item label { font-size: 10px; color: #fbbf24; font-weight: bold; }
        input, select { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: #fff; padding: 8px; font-size: 14px; outline: none; height: 38px; }
        .sbtn { background: #fbbf24; color: #0c1a2e; border: none; border-radius: 6px; width: 100%; padding: 10px; font-weight: 900; font-size: 15px; cursor: pointer; margin-top: 4px; }

        /* 탭 메뉴 */
        .tab-menu { display: flex; background: #0c1a2e; border-bottom: 1px solid rgba(255,255,255,0.1); overflow-x: auto; }
        .tab { flex: 1; min-width: 80px; text-align: center; padding: 14px 0; font-size: 13px; font-weight: bold; color: rgba(255,255,255,0.4); cursor: pointer; position: relative; }
        .tab.on { color: #fbbf24; }
        .tab.on::after { content: ''; position: absolute; bottom: 0; left: 15%; right: 15%; height: 3px; background: #fbbf24; }

        /* 컨텐츠 영역 */
        .main-content { flex: 1; position: relative; background: #fff; }
        .page { display: none; width: 100%; height: 100%; overflow: hidden; }
        .page.on { display: block; }
        iframe { width: 100%; height: 100%; border: none; }

        /* 정보 연결 페이지 (구글 차단 해결) */
        .link-page { background: #0c1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .link-btn { background: #4285F4; color: #fff; border: none; padding: 15px 25px; border-radius: 10px; font-weight: bold; font-size: 16px; margin-top: 15px; width: 100%; max-width: 250px; }

        /* 환율 계산기 */
        #calcPage { background: #0c1a2e; padding: 20px; overflow-y: auto; }
        .calc-card { background: rgba(255,255,255,0.07); border-radius: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; }
        .calc-group { margin-bottom: 10px; }
        .calc-group label { display: block; font-size: 11px; color: #fbbf24; margin-bottom: 5px; font-weight: bold; }
        .calc-input-wrap { position: relative; display: flex; align-items: center; }
        .calc-input-wrap input { font-size: 16px; font-weight: bold; padding-right: 40px; width: 100%; }
        .unit { position: absolute; right: 10px; color: rgba(255,255,255,0.5); font-weight: bold; }

        .splash { position: absolute; inset: 0; background: #0c1a2e; z-index: 5; display: flex; align-items: center; justify-content: center; text-align: center; transition: 0.3s; }
        .splash.hide { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>✈️ SEAN TOUR</h1>
        <div class="search-container">
            <div class="input-row">
                <div class="input-item"><label>목적지</label><input type="text" id="targetCity" value="하노이"></div>
                <div class="input-item" style="flex:0.4;"><label>인원</label><select id="pCount"><option value="1">1명</option><option value="2" selected>2명</option></select></div>
            </div>
            <div class="input-row">
                <div class="input-item"><label>가는 날</label><input type="date" id="dateStart"></div>
                <div class="input-item"><label>오는 날</label><input type="date" id="dateEnd"></div>
            </div>
            <button class="sbtn" onclick="runSearch()">실시간 통합 검색</button>
        </div>
    </div>

    <div class="tab-menu" id="mainTab">
        <div class="tab on" onclick="changeTab(this, 'flight')">항공권</div>
        <div class="tab" onclick="changeTab(this, 'food')">맛집</div>
        <div class="tab" onclick="changeTab(this, 'hotel')">숙소</div>
        <div class="tab" onclick="changeTab(this, 'weather')">날씨</div>
        <div class="tab" onclick="changeTab(this, 'calc')">환율</div>
    </div>

    <div class="main-content">
        <div class="page on" id="flightPage"><iframe id="fFrame"></iframe></div>
        
        <div class="page link-page" id="foodPage">
            <p id="foodTxt">하노이 실시간 맛집 보기</p>
            <button class="link-btn" onclick="openLink('food')">🍴 구글지도에서 찾기</button>
        </div>
        <div class="page link-page" id="hotelPage">
            <p id="hotelTxt">하노이 실시간 숙소 보기</p>
            <button class="link-btn" onclick="openLink('hotel')">🏨 최저가 숙소 찾기</button>
        </div>
        <div class="page link-page" id="weatherPage">
            <p id="weatherTxt">하노이 일정별 날씨 예보</p>
            <button class="link-btn" onclick="openLink('weather')">🌤️ 실시간 날씨 보기</button>
        </div>

        <div class="page" id="calcPage">
            <div class="calc-card">
                <div class="calc-group"><label>일본 (JPY)</label><div class="calc-input-wrap"><input type="number" id="jpy" oninput="ex('jpy')" placeholder="0"><span class="unit">¥</span></div></div>
                <div class="calc-group"><label>원화 (KRW)</label><div class="calc-input-wrap"><input type="number" id="jpy_krw" oninput="ex('jpy_krw')" placeholder="0"><span class="unit">₩</span></div></div>
            </div>
            <div class="calc-card">
                <div class="calc-group"><label>베트남 (VND)</label><div class="calc-input-wrap"><input type="number" id="vnd" oninput="ex('vnd')" placeholder="0"><span class="unit">₫</span></div></div>
                <div class="calc-group"><label>원화 (KRW)</label><div class="calc-input-wrap"><input type="number" id="vnd_krw" oninput="ex('vnd_krw')" placeholder="0"><span class="unit">₩</span></div></div>
            </div>
        </div>

        <div class="splash" id="splash"><p style="opacity:0.5;">검색 버튼을 눌러 정보를 로드하세요!</p></div>
    </div>

    <script>
        // 초기 설정 및 공항 코드
        const codes = { '오사카': 'KIX', '도쿄': 'NRT', '후쿠오카': 'FUK', '하노이': 'HAN', '다낭': 'DAD', '나트랑': 'CXR', '방콕': 'BKK' };
        const d = new Date(); d.setDate(d.getDate() + 14);
        const e = new Date(d); e.setDate(d.getDate() + 17);
        const s = (x) => x.toISOString().split('T')[0];
        document.getElementById('dateStart').value = s(d);
        document.getElementById('dateEnd').value = s(e);

        function runSearch() {
            const city = document.getElementById('targetCity').value.trim();
            const adults = document.getElementById('pCount').value;
            const d1 = document.getElementById('dateStart').value.replace(/-/g, '');
            const d2 = document.getElementById('dateEnd').value.replace(/-/g, '');
            
            if(!city) return;
            document.getElementById('splash').classList.add('hide');

            // 텍스트 자동 변경
            document.getElementById('foodTxt').innerText = `${city} 실시간 맛집 보기`;
            document.getElementById('hotelTxt').innerText = `${city} 실시간 숙소 보기`;
            document.getElementById('weatherTxt').innerText = `${city} 일정별 날씨 예보`;

            // 항공권 검색
            const code = codes[city] || 'HAN';
            document.getElementById('fFrame').src = `https://m-flight.naver.com/flights/international/ICN-${code}-${d1}/${code}-ICN-${d2}?adult=${adults}&isDirect=true&fareType=Y`;
            
            // 검색 후 항공권 탭으로 자동 이동
            changeTab(document.querySelectorAll('.tab')[0], 'flight');
        }

        function openLink(type) {
            const city = document.getElementById('targetCity').value.trim();
            const d1 = document.getElementById('dateStart').value;
            let q = type === 'food' ? city + ' 맛집' : type === 'hotel' ? city + ' 호텔' : city + ' 날씨 ' + d1;
            window.open(`https://www.google.com/search?q=${encodeURIComponent(q)}`, '_blank');
        }

        function ex(type) {
            const jpyRate = 9.0; const vndRate = 0.054;
            const getVal = (id) => document.getElementById(id).value;
            const setVal = (id, val) => document.getElementById(id).value = Math.floor(val);

            if(type === 'jpy') setVal('jpy_krw', getVal('jpy') * jpyRate);
            if(type === 'jpy_krw') setVal('jpy', getVal('jpy_krw') / jpyRate);
            if(type === 'vnd') setVal('vnd_krw', getVal('vnd') * vndRate);
            if(type === 'vnd_krw') setVal('vnd', getVal('vnd_krw') / vndRate);
        }

        function changeTab(el, id) {
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
            document.querySelectorAll('.page').forEach(x => x.classList.remove('on'));
            el.classList.add('on');
            document.getElementById(id + 'Page').classList.add('on');
        }
    </script>
</body>
</html>
