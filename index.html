<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SEAN TOUR - 스마트 가이드</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Noto Sans KR', sans-serif; background: #0c1a2e; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: #0c1a2e; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        h1 { font-size: 20px; font-weight: 900; margin-bottom: 12px; color: #fbbf24; text-align: center; }
        .search-container { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .input-row { display: flex; gap: 6px; margin-bottom: 6px; }
        .input-item { flex: 1; display: flex; flex-direction: column; gap: 3px; }
        .input-item label { font-size: 9px; color: #fbbf24; font-weight: bold; }
        input, select, textarea { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: #fff; padding: 6px; font-size: 13px; outline: none; }
        input, select { height: 34px; }
        .sbtn { background: #fbbf24; color: #0c1a2e; border: none; border-radius: 6px; width: 100%; padding: 12px; font-weight: 900; font-size: 15px; cursor: pointer; }
        .tab-menu { display: flex; background: #0c1a2e; border-bottom: 1px solid rgba(255,255,255,0.1); overflow-x: auto; }
        .tab { padding: 15px 18px; font-size: 14px; font-weight: bold; color: rgba(255,255,255,0.4); cursor: pointer; position: relative; flex-shrink: 0; }
        .tab.on { color: #fbbf24; }
        .tab.on::after { content: ''; position: absolute; bottom: 0; left: 10px; right: 10px; height: 3px; background: #fbbf24; }
        .main-content { flex: 1; position: relative; background: #fff; }
        .page { display: none; width: 100%; height: 100%; overflow-y: auto; }
        .page.on { display: block; }
        iframe { width: 100%; height: 100%; border: none; }
        .link-page { background: #0c1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .link-btn { background: #4285F4; color: #fff; border: none; padding: 16px 20px; border-radius: 10px; font-weight: bold; font-size: 16px; margin-top: 20px; width: 100%; max-width: 280px; }
        #myPage { background: #f4f7f9; padding: 15px; color: #333; }
        .reserve-card { background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        #calcPage { background: #0c1a2e; padding: 15px; }
        .calc-card { background: rgba(255,255,255,0.07); border-radius: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; }
        .splash { position: absolute; inset: 0; background: #0c1a2e; z-index: 5; display: flex; align-items: center; justify-content: center; text-align: center; }
        .splash.hide { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>✈️ SEAN TOUR</h1>
        <div class="search-container">
            <div class="input-row">
                <div class="input-item">
                    <label>어디로 떠나시나요?</label>
                    <input type="text" id="targetCity" value="" placeholder="도시명을 입력하세요 (예: 시즈오카)" oninput="updateBtn()">
                </div>
                <div class="input-item" style="flex:0.4;">
                    <label>인원</label>
                    <select id="pCount"><option value="1">1명</option><option value="2" selected>2명</option></select>
                </div>
            </div>
            <div class="input-row">
                <div class="input-item"><label>가는 날</label><input type="date" id="dateStart"></div>
                <div class="input-item"><label>오는 날</label><input type="date" id="dateEnd"></div>
            </div>
            <button id="searchBtn" class="sbtn" onclick="runSearch()">도시를 입력하세요</button>
        </div>
    </div>

    <div class="tab-menu">
        <div class="tab on" onclick="changeTab(this, 'flight')">항공권</div>
        <div class="tab" onclick="changeTab(this, 'food')">맛집 추천</div>
        <div class="tab" onclick="changeTab(this, 'hotel')">숙소 예약</div>
        <div class="tab" onclick="changeTab(this, 'weather')">날씨</div>
        <div class="tab" onclick="changeTab(this, 'my')">나의 예약</div>
        <div class="tab" onclick="changeTab(this, 'calc')">환율</div>
    </div>

    <div class="main-content">
        <div class="page on" id="flightPage"><iframe id="fFrame"></iframe></div>
        <div class="page link-page" id="foodPage"><h3 id="foodTitle" style="color:#fbbf24">맛집 정보</h3><button id="foodBtn" class="link-btn" onclick="goLink('food')">🍴 맛집 보기</button></div>
        <div class="page link-page" id="hotelPage"><h3 id="hotelTitle" style="color:#fbbf24">숙소 정보</h3><button id="hotelBtn" class="link-btn" onclick="goLink('hotel')">🏨 호텔 검색</button></div>
        <div class="page link-page" id="weatherPage"><h3 id="weatherTitle" style="color:#fbbf24">날씨 정보</h3><button id="weatherBtn" class="link-btn" onclick="goLink('weather')">🌤️ 날씨 확인</button></div>

        <div class="page" id="myPage">
            <div class="reserve-card"><h4>✈️ 항공권</h4><textarea id="memoFlight" placeholder="예약 정보 입력" oninput="saveMemo()"></textarea></div>
            <div class="reserve-card"><h4>🏨 숙소</h4><textarea id="memoHotel" placeholder="숙소 정보 입력" oninput="saveMemo()"></textarea></div>
            <div class="reserve-card"><h4>🍴 맛집</h4><textarea id="memoFood" placeholder="가고 싶은 곳 입력" oninput="saveMemo()"></textarea></div>
        </div>

        <div class="page" id="calcPage">
            <div class="calc-card">
                <p style="font-size:12px; margin-bottom:10px; color:#fbbf24">🇻🇳 베트남 동(VND)</p>
                <input type="number" id="v" oninput="ex('v')" placeholder="동(VND) 입력" style="width:100%; margin-bottom:5px;">
                <input type="number" id="v_k" oninput="ex('v_k')" placeholder="원(KRW) 환산" style="width:100%;">
            </div>
            <div class="calc-card">
                <p style="font-size:12px; margin-bottom:10px; color:#fbbf24">🇯🇵 일본 엔화(JPY)</p>
                <input type="number" id="j" oninput="ex('j')" placeholder="엔(JPY) 입력" style="width:100%; margin-bottom:5px;">
                <input type="number" id="j_k" oninput="ex('j_k')" placeholder="원(KRW) 환산" style="width:100%;">
            </div>
        </div>

        <div class="splash" id="splash"><p style="opacity:0.5;">여행하실 도시를 입력하고<br>검색을 눌러주세요!</p></div>
    </div>

    <script>
        // 시즈오카(FSZ) 포함 주요 공항 코드 업데이트
        const codes = { '하노이': 'HAN', '오사카': 'KIX', '도쿄': 'NRT', '후쿠오카': 'FUK', '시즈오카': 'FSZ', '다낭': 'DAD', '나트랑': 'CXR', '방콕': 'BKK' };
        
        const d = new Date(); d.setDate(d.getDate() + 14);
        const e = new Date(d); e.setDate(d.getDate() + 17);
        const fmt = (x) => x.toISOString().split('T')[0];
        document.getElementById('dateStart').value = fmt(d);
        document.getElementById('dateEnd').value = fmt(e);

        window.onload = () => {
            document.getElementById('memoFlight').value = localStorage.getItem('mFlight') || '';
            document.getElementById('memoHotel').value = localStorage.getItem('mHotel') || '';
            document.getElementById('memoFood').value = localStorage.getItem('mFood') || '';
        };

        function saveMemo() {
            localStorage.setItem('mFlight', document.getElementById('memoFlight').value);
            localStorage.setItem('mHotel', document.getElementById('memoHotel').value);
            localStorage.setItem('mFood', document.getElementById('memoFood').value);
        }

        function updateBtn() {
            const city = document.getElementById('targetCity').value.trim();
            document.getElementById('searchBtn').innerText = city ? `실시간 ${city} 검색` : "도시를 입력하세요";
        }

        function runSearch() {
            const city = document.getElementById('targetCity').value.trim();
            if(!city) return;
            document.getElementById('splash').classList.add('hide');
            
            const d1 = document.getElementById('dateStart').value.replace(/-/g, '');
            const d2 = document.getElementById('dateEnd').value.replace(/-/g, '');
            const adults = document.getElementById('pCount').value;

            // 등록되지 않은 도시일 경우 네이버 항공권 메인 검색으로 연결
            const code = codes[city];
            if (code) {
                document.getElementById('fFrame').src = `https://m-flight.naver.com/flights/international/ICN-${code}-${d1}/${code}-ICN-${d2}?adult=${adults}&isDirect=true&fareType=Y`;
            } else {
                // 코드가 없으면 해당 도시 검색 결과 페이지로 연결
                document.getElementById('fFrame').src = `https://m-flight.naver.com/flights/international/search?trip=RT&itinerary=ICN-${city}-${d1},${city}-ICN-${d2}&adult=${adults}`;
            }

            document.getElementById('foodTitle').innerText = `${city} 맛집 정보`;
            document.getElementById('hotelTitle').innerText = `${city} 숙소 정보`;
            document.getElementById('weatherTitle').innerText = `${city} 날씨 정보`;
            document.getElementById('foodBtn').innerText = `🍴 ${city} 맛집 보기`;
            document.getElementById('hotelBtn').innerText = `🏨 ${city} 호텔 검색`;
            document.getElementById('weatherBtn').innerText = `🌤️ ${city} 날씨 확인`;

            changeTab(document.querySelectorAll('.tab')[0], 'flight');
        }

        function goLink(type) {
            const city = document.getElementById('targetCity').value.trim();
            const q = type === 'food' ? `${city} 맛집` : type === 'hotel' ? `${city} 호텔` : `${city} 날씨 ${document.getElementById('dateStart').value}`;
            window.open(`https://www.google.com/search?q=${encodeURIComponent(q)}`, '_blank');
        }

        function ex(type) {
            const vRate = 0.054; const jRate = 9.0;
            const v = document.getElementById('v'); const vk = document.getElementById('v_k');
            const j = document.getElementById('j'); const jk = document.getElementById('j_k');
            if(type === 'v') vk.value = Math.floor(v.value * vRate);
            if(type === 'v_k') v.value = Math.floor(vk.value / vRate);
            if(type === 'j') jk.value = Math.floor(j.value * jRate);
            if(type === 'j_k') j.value = Math.floor(jk.value / jRate);
        }

        function changeTab(el, id) {
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
            document.querySelectorAll('.page').forEach(x => x.classList.remove('on'));
            el.classList.add('on');
            document.getElementById(id + 'Page').classList.add('on');
        }
    </script>
</body>
</html>
