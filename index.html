<button class="sbtn" style="background:#4ade80; margin-top:5px;" onclick="checkWeather()">
    📅 선택 일정 날씨 확인
</button>

<script>
function checkWeather() {
    const city = document.getElementById('targetCity').value.trim();
    const startDate = document.getElementById('dateStart').value;
    
    if(!city) return;

    // 사용자가 입력한 '가는 날'과 '도시명'을 조합하여 구글 실시간 날씨 검색 연결
    const weatherUrl = `https://www.google.com/maps/search/${encodeURIComponent(city + ' 날씨 ' + startDate)}`;
    window.open(weatherUrl, '_blank');
}
</script>
